apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-service
  labels:
    app.kubernetes.io/name: user-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: user-service
  template:
    metadata:
      labels:
        app.kubernetes.io/name: user-service
    spec:
      containers:
        - name: user-service
          image: 240218516941.dkr.ecr.us-east-1.amazonaws.com/bookstore/user-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3001
          env:
            - name: DATABASE_URL
              value: postgresql://bookstore:bookstore@postgres-users:5432/bookstore_users?sslmode=disable
            - name: NODE_ENV
              value: production
            - name: JWT_SECRET
              value: change-me-in-production
---
apiVersion: v1
kind: Service
metadata:
  name: user-service
  labels:
    app.kubernetes.io/name: user-service
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: user-service
  ports:
    - port: 3001
      targetPort: 3001
