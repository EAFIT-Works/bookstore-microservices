apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-books-data
  labels:
    app.kubernetes.io/name: postgres-books
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
  storageClassName: eks-auto-ebs
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres-books
  labels:
    app.kubernetes.io/name: postgres-books
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: postgres-books
  template:
    metadata:
      labels:
        app.kubernetes.io/name: postgres-books
    spec:
      securityContext:
        fsGroup: 70
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_USER
              value: bookstore
            - name: POSTGRES_PASSWORD
              value: bookstore
            - name: POSTGRES_DB
              value: bookstore_books
            - name: POSTGRES_HOST_AUTH_METHOD
              value: trust
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
              subPath: pgdata
          readinessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - bookstore
                - -d
                - bookstore_books
            initialDelaySeconds: 5
            periodSeconds: 5
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: postgres-books-data
---
apiVersion: v1
kind: Service
metadata:
  name: postgres-books
  labels:
    app.kubernetes.io/name: postgres-books
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: postgres-books
  ports:
    - port: 5432
      targetPort: 5432
