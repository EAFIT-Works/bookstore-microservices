apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-users-data
  labels:
    app.kubernetes.io/name: postgres-users
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
  storageClassName: gp2
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres-users
  labels:
    app.kubernetes.io/name: postgres-users
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: postgres-users
  template:
    metadata:
      labels:
        app.kubernetes.io/name: postgres-users
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_USER
              value: bookstore
            - name: POSTGRES_PASSWORD
              value: bookstore
            - name: POSTGRES_DB
              value: bookstore_users
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - bookstore
                - -d
                - bookstore_users
            initialDelaySeconds: 5
            periodSeconds: 5
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: postgres-users-data
---
apiVersion: v1
kind: Service
metadata:
  name: postgres-users
  labels:
    app.kubernetes.io/name: postgres-users
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: postgres-users
  ports:
    - port: 5432
      targetPort: 5432
