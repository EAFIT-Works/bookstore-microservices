apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-service
  labels:
    app.kubernetes.io/name: order-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: order-service
  template:
    metadata:
      labels:
        app.kubernetes.io/name: order-service
    spec:
      containers:
        - name: order-service
          image: YOUR_ECR_REGISTRY/order-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3003
          env:
            - name: DATABASE_URL
              value: postgresql://bookstore:bookstore@postgres-orders:5432/bookstore_orders
            - name: NODE_ENV
              value: production
            - name: JWT_SECRET
              value: change-me-in-production
            - name: USER_SERVICE_URL
              value: http://user-service:3001
            - name: BOOK_SERVICE_URL
              value: http://book-service:3000
---
apiVersion: v1
kind: Service
metadata:
  name: order-service
  labels:
    app.kubernetes.io/name: order-service
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: order-service
  ports:
    - port: 3003
      targetPort: 3003
