apiVersion: apps/v1
kind: Deployment
metadata:
  name: book-service
  labels:
    app.kubernetes.io/name: book-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: book-service
  template:
    metadata:
      labels:
        app.kubernetes.io/name: book-service
    spec:
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.36
          command:
            - sh
            - -c
            - until nc -z postgres-books 5432; do sleep 2; done
      containers:
        - name: book-service
          image: 240218516941.dkr.ecr.us-east-1.amazonaws.com/bookstore/book-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
          env:
            - name: DATABASE_URL
              value: postgresql://bookstore:bookstore@postgres-books:5432/bookstore_books?sslmode=disable
            - name: NODE_ENV
              value: production
---
apiVersion: v1
kind: Service
metadata:
  name: book-service
  labels:
    app.kubernetes.io/name: book-service
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: book-service
  ports:
    - port: 3000
      targetPort: 3000
