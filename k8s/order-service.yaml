apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-service
  labels:
    app.kubernetes.io/name: order-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: order-service
  template:
    metadata:
      labels:
        app.kubernetes.io/name: order-service
    spec:
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.36
          command:
            - sh
            - -c
            - until nc -z postgres-orders 5432; do sleep 2; done
      containers:
        - name: order-service
          image: 240218516941.dkr.ecr.us-east-1.amazonaws.com/bookstore/order-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3003
          env:
            - name: DATABASE_URL
              value: postgresql://bookstore:bookstore@postgres-orders:5432/bookstore_orders?sslmode=disable
            - name: NODE_ENV
              value: production
            - name: JWT_SECRET
              value: change-me-in-production
            - name: USER_SERVICE_URL
              value: http://user-service:3001
            - name: BOOK_SERVICE_URL
              value: http://book-service:3000
---
apiVersion: v1
kind: Service
metadata:
  name: order-service
  labels:
    app.kubernetes.io/name: order-service
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: order-service
  ports:
    - port: 3003
      targetPort: 3003
