services:
  postgres-books:
    image: postgres:16-alpine
    container_name: bookstore_postgres_books
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-bookstore}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-bookstore}
      POSTGRES_DB: bookstore_books
    volumes:
      - postgres_books_data:/var/lib/postgresql/data
    ports:
      - "${BOOK_POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-bookstore} -d bookstore_books",
        ]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - back-tier

  postgres-users:
    image: postgres:16-alpine
    container_name: bookstore_postgres_users
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-bookstore}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-bookstore}
      POSTGRES_DB: bookstore_users
    volumes:
      - postgres_users_data:/var/lib/postgresql/data
    ports:
      - "${USER_POSTGRES_PORT:-5433}:5432"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-bookstore} -d bookstore_users",
        ]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - back-tier

  postgres-reviews:
    image: postgres:16-alpine
    container_name: bookstore_postgres_reviews
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-bookstore}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-bookstore}
      POSTGRES_DB: bookstore_reviews
    volumes:
      - postgres_reviews_data:/var/lib/postgresql/data
    ports:
      - "${REVIEW_POSTGRES_PORT:-5434}:5432"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-bookstore} -d bookstore_reviews",
        ]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - back-tier

  postgres-orders:
    image: postgres:16-alpine
    container_name: bookstore_postgres_orders
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-bookstore}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-bookstore}
      POSTGRES_DB: bookstore_orders
    volumes:
      - postgres_orders_data:/var/lib/postgresql/data
    ports:
      - "${ORDER_POSTGRES_PORT:-5435}:5432"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-bookstore} -d bookstore_orders",
        ]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - back-tier

  book-service:
    build:
      context: ./backend/book-service
      dockerfile: Dockerfile
    container_name: bookstore_book_service
    env_file:
      - path: .env
        required: false
    environment:
      DATABASE_URL: ${BOOK_DATABASE_URL:-postgresql://bookstore:bookstore@postgres-books:5432/bookstore_books}
      NODE_ENV: ${APP_NODE_ENV:-development}
    depends_on:
      postgres-books:
        condition: service_healthy
    networks:
      - back-tier

  user-service:
    build:
      context: ./backend/user-service
      dockerfile: Dockerfile
    container_name: bookstore_user_service
    env_file:
      - path: .env
        required: false
    environment:
      DATABASE_URL: ${USER_DATABASE_URL:-postgresql://bookstore:bookstore@postgres-users:5432/bookstore_users}
      NODE_ENV: ${APP_NODE_ENV:-development}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
    depends_on:
      postgres-users:
        condition: service_healthy
    networks:
      - back-tier

  review-service:
    build:
      context: ./backend/review-service
      dockerfile: Dockerfile
    container_name: bookstore_review_service
    env_file:
      - path: .env
        required: false
    environment:
      DATABASE_URL: ${REVIEW_DATABASE_URL:-postgresql://bookstore:bookstore@postgres-reviews:5432/bookstore_reviews}
      NODE_ENV: ${APP_NODE_ENV:-development}
    depends_on:
      postgres-reviews:
        condition: service_healthy
    networks:
      - back-tier

  order-service:
    build:
      context: ./backend/order-service
      dockerfile: Dockerfile
    container_name: bookstore_order_service
    env_file:
      - path: .env
        required: false
    environment:
      DATABASE_URL: ${ORDER_DATABASE_URL:-postgresql://bookstore:bookstore@postgres-orders:5432/bookstore_orders}
      NODE_ENV: ${APP_NODE_ENV:-development}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      USER_SERVICE_URL: ${USER_SERVICE_URL:-http://user-service:3001}
      BOOK_SERVICE_URL: ${BOOK_SERVICE_URL:-http://book-service:3000}
    depends_on:
      postgres-orders:
        condition: service_healthy
    networks:
      - back-tier

  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    container_name: bookstore_api_gateway
    ports:
      - "8080:8080"
    depends_on:
      - book-service
      - user-service
      - review-service
      - order-service
    networks:
      - back-tier

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: bookstore_frontend
    ports:
      - "80:80"
    environment:
      NGINX_PORT: ${NGINX_PORT:-80}
      API_GATEWAY_URL: ${API_GATEWAY_URL:-http://api-gateway:8080}
    depends_on:
      - api-gateway
    networks:
      - front-tier
      - back-tier

volumes:
  postgres_books_data:
  postgres_users_data:
  postgres_reviews_data:
  postgres_orders_data:

networks:
  front-tier:
  back-tier:
